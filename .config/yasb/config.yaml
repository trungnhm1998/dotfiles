# YASB - supercharged Catppuccin-Frappe bar. Theming in styles.css.
# Docs: https://github.com/amnweb/yasb/wiki/Configuration
watch_stylesheet: true
watch_config: true
debug: false

# Tray-menu komorebi commands (hotkeys are driven by AutoHotkey, not whkd).
komorebi:
  start_command: "komorebic start"
  stop_command: "komorebic stop"
  reload_command: "komorebic reload-configuration"

bars:
  primary-bar:
    enabled: true
    class_name: "yasb-bar"
    screens: ['primary']
    alignment:
      position: "top"
      align: "center"
    window_flags:
      always_on_top: false
      windows_app_bar: false      # floating; lets toggle-maximize go edge-to-edge under the bar
      hide_on_fullscreen: true    # don't pop over a real-fullscreen app/game
      auto_hide: false            # always visible; OLED burn-in handled by komorebi.ahk orbit guard
    dimensions:
      width: "100%"
      height: 30
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left: ["wm_toggle", "kanata_toggle", "workspaces", "active_layout", "taskbar"]
      center: ["clock"]
      right: ["cpu", "memory", "gpu", "traffic", "weather", "media", "volume", "microphone", "wifi", "bluetooth", "systray", "power_menu"]

  secondary-bar:
    enabled: true
    class_name: "yasb-bar"
    screens: ['VI-01']
    alignment:
      position: "top"
      align: "center"
    window_flags:
      always_on_top: false
      windows_app_bar: false
      hide_on_fullscreen: true
      auto_hide: false
    dimensions:
      width: "100%"
      height: 30
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left: ["workspaces", "active_layout", "taskbar"]
      center: ["clock"]
      right: []

widgets:
  workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "offline"
      label_workspace_btn: "{name}"
      label_workspace_active_btn: "{name}"
      label_workspace_populated_btn: "{name}"
      hide_empty_workspaces: true

  active_layout:
    type: "komorebi.active_layout.ActiveLayoutWidget"
    options:
      hide_if_offline: true
      label: "{icon}"
      # Text codes are safe defaults; swap any value for a Nerd Font glyph to taste (cosmetic, live-reloads).
      layouts: ["bsp", "columns", "rows", "grid", "vertical_stack", "horizontal_stack", "ultrawide_vertical_stack", "right_main_vertical_stack"]
      layout_icons:
        bsp: "BSP"
        columns: "COL"
        rows: "ROW"
        grid: "GRID"
        vertical_stack: "VSTK"
        horizontal_stack: "HSTK"
        ultrawide_vertical_stack: "UWV"
        right_main_vertical_stack: "RMV"
        monocle: "MONO"
        maximized: "MAX"
        floating: "FLT"
        paused: "PAUSE"
        tiling: "TILE"
      callbacks:
        on_left: "toggle_layout_menu"
        on_middle: "next_layout"
        on_right: "prev_layout"

  wm_toggle:
    type: "yasb.custom.CustomWidget"
    options:
      label: "{data}"
      class_name: "wm-toggle"
      tooltip: true
      tooltip_label: "Window manager — click to toggle (off for gaming)"
      exec_options:
        # Poll WM state -> bar glyph. Calls the toggle script in -State mode; a bare path avoids
        # yasb splitting run_cmd on spaces (which mangles an inline if + quotes).
        # Do NOT set `encoding` here: yasb's string path hardcodes output.decode("utf-8") on the raw
        # bytes, so setting encoding makes Popen return a str and .decode() throws -> stuck "Loading...".
        # pwsh already emits UTF-8 on redirected stdout, so the glyph round-trips with no encoding set.
        run_cmd: "pwsh -NoProfile -File C:\\Users\\mint\\.config\\komorebi\\wm-toggle.ps1 -State"
        run_interval: 5000          # 5s; widen if the poll ever shows as churn
        return_format: "string"
      callbacks:
        on_left: "exec pwsh -NoProfile -WindowStyle Hidden -File C:\\Users\\mint\\.config\\komorebi\\wm-toggle.ps1"
        on_middle: "do_nothing"
        on_right: "do_nothing"

  kanata_toggle:
    type: "yasb.custom.CustomWidget"
    options:
      label: "{data}"
      class_name: "kanata-toggle"
      tooltip: true
      tooltip_label: "Keyboard layout — click to toggle (gaming = Kanata off)"
      exec_options:
        # Poll Kanata's run-state -> bar glyph. Bare path (yasb splits run_cmd on spaces).
        # Do NOT set `encoding` (yasb hardcodes output.decode("utf-8"); setting it throws -> "Loading...").
        run_cmd: "pwsh -NoProfile -File C:\\Users\\mint\\.config\\kanata\\kanata-toggle.ps1 -State"
        run_interval: 5000
        return_format: "string"
      callbacks:
        on_left: "exec pwsh -NoProfile -WindowStyle Hidden -File C:\\Users\\mint\\.config\\kanata\\kanata-toggle.ps1"
        on_middle: "do_nothing"
        on_right: "do_nothing"

  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 16
      show_only_visible: true       # only currently-visible (focused-workspace) windows
      monitor_exclusive: true       # only this monitor's apps
      hide_empty: true              # hide the pill when the workspace has no apps
      animation:
        enabled: false

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%H:%M}"
      label_alt: "{%a %d %b  %H:%M:%S}"
      timezones: []

  # -- right cluster -------------------------------------------------
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title}"
      label_alt: "{artist} - {title}"
      hide_empty: true               # no pill when nothing is playing
      max_field_size:
        label: 22
        label_alt: 40
        truncate_whole_label: true
      show_thumbnail: true
      thumbnail_alpha: 80
      thumbnail_corner_radius: 6
      icons:
        prev_track: ""
        next_track: ""
        play: ""
        pause: ""

  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: " {info[percent][total]}%"
      label_alt: " {info[percent][total]}% · {info[freq][current]:.0f} MHz"
      update_interval: 2000
      callbacks:
        on_left: "toggle_label"

  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: " {virtual_mem_percent}%"
      label_alt: " {virtual_mem_used}/{virtual_mem_total}"
      update_interval: 5000
      callbacks:
        on_left: "toggle_label"

  gpu:
    type: "yasb.gpu.GpuWidget"
    options:
      label: " {info[utilization]}%"
      label_alt: " {info[utilization]}% · {info[temp]}°C · {info[mem_used]}"
      gpu_index: 0
      update_interval: 2000
      units: "metric"
      callbacks:
        on_left: "toggle_label"

  traffic:
    type: "yasb.traffic.TrafficWidget"
    options:
      label: " {download_speed}    {upload_speed}"
      label_alt: " {today_downloaded}    {today_uploaded}"
      interface: "auto"
      update_interval: 1000
      speed_unit: "bits"
      callbacks:
        on_left: "toggle_label"

  weather:
    type: "yasb.open_meteo.OpenMeteoWidget"
    options:
      # No lat/long in config (v2.0.5). Click the pill (on_left: toggle_card) ->
      # the card opens with a search box -> type "Ho Chi Minh City" -> pick it; it caches.
      label: "<span class='icon'>{icon}</span> {temp}"
      label_alt: "<span class='icon'>{icon}</span> {condition_text}  {temp}"
      units: "metric"
      update_interval: 1800
      hide_decimal: true
      callbacks:
        on_left: "toggle_card"

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "{icon}"
      label_alt: "{icon} {level}"
      icons:
        muted: ""
        "10": ""
        "30": ""
        "60": ""
        "100": ""
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:sound"

  microphone:
    type: "yasb.microphone.MicrophoneWidget"
    options:
      label: "{icon}"
      label_alt: "{icon} {level}"
      mute_text: "muted"
      icons:
        normal: ""
        muted: ""
      callbacks:
        on_left: "toggle_label"

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "{wifi_icon}"
      label_alt: "{wifi_icon} {wifi_name}"
      update_interval: 5000
      ethernet_label: "{wifi_icon}"
      ethernet_label_alt: "{wifi_icon} {ip_addr}"
      ethernet_icon: ""
      wifi_icons:
        - ""
        - ""
        - ""
        - ""
        - ""
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:network"

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "{icon}"
      label_alt: "{device_name}"
      icons:
        bluetooth_on: ""
        bluetooth_off: ""
        bluetooth_connected: ""
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:bluetooth"

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: ""
      label_expanded: ""
      label_position: "left"
      icon_size: 16
      pin_click_modifier: "alt"
      show_unpinned: true

  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: ""
      uptime: false
      blur: false
      button_row: 5
      buttons:
        signout: ["", "Sign out"]
        sleep: ["", "Sleep"]
        restart: ["", "Restart"]
        shutdown: ["", "Shut Down"]
        cancel: ["", "Cancel"]
