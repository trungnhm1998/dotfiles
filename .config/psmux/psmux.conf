# ~/.config/psmux/psmux.conf — Windows-native tmux (psmux). Portable core of Max's
# tmux setup, minus TPM/plugins/status-bar/macOS hooks (psmux can't run TPM).
# psmux defaults to pwsh (PowerShell 7), so no default-shell line is needed.

# Prefix: Ctrl+Space (same as real tmux; WezTerm yields it via the launcher wrapper)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
# 2nd prefix for WezTerm panes: WezTerm's synthetic Ctrl+Space goes through ConPTY, which
# reconstructs the NUL byte (Ctrl+Space = Ctrl+@ = 0x00) as a native Ctrl+Shift+2 key-event, so
# psmux needs C-S-2 as a 2nd prefix to catch it. (ssh/wsl real tmux reads the raw NUL byte;
# Windows Terminal sends a real VK_SPACE -- both already match C-Space, so this only helps WezTerm.)
# WHY run-shell and not `set -g prefix2 C-S-2`: psmux's CONFIG parser folds "C-S-2" down to "C-2"
# (drops the Shift), which does NOT match the incoming key; its CLI arg parser keeps "C-S-2" intact.
# Shelling out to the CLI parser at load time is the only spelling that persists correctly.
run-shell "psmux set-option -g prefix2 C-S-2"

# Splits / new window, inheriting the current dir. (s = stacked, v = side-by-side, t = new window)
# NB: psmux (unlike real tmux) does NOT strip an inline "# ..." comment from a command line --
# the trailing tokens become split-window's shell-command, so the new pane runs `#`, immediately
# exits (cmd=shell, status 0), and the split vanishes. Keep comments on their OWN line, never
# trailing a bind/command.
unbind '"'
unbind %
bind s split-window   -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind t new-window     -c "#{pane_current_path}"

# Reload
bind r source-file ~/.config/psmux/psmux.conf

# vi pane navigation
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vi copy-mode
unbind [
bind Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection

# Quality-of-life (portable bits lifted from tmux.conf)
set  -g  base-index 1
setw -g  pane-base-index 1
set  -g  renumber-windows on
set  -g  mouse on
set  -sg escape-time 10
# Identify psmux panes to WezTerm: prefix the pane title with "psmux:" (the mux forwards the
# title even under the persistent unix domain, where fg-process-name is nil). wezterm.lua's
# is_psmux_pane matches that prefix and yields Ctrl+Space to psmux. #{pane_title} keeps the
# child's own title (e.g. a Claude teammate's activity) after the marker.
set  -g  set-titles on
set  -g  set-titles-string "psmux:#{pane_title}"
set  -g  pane-active-border-style 'fg=magenta,bg=default'
set  -g  pane-border-style        'fg=brightblack,bg=default'
