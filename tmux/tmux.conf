# ref
# http://www.hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

source $HOME/dotfiles/tmux/reset.conf
source $HOME/dotfiles/tmux/tmux-keybindings.conf

set-option -g default-terminal "tmux-256color"
# ref https://wezfurlong.org/wezterm/faq.html#how-to-troubleshoot-keys-that-dont-work-or-produce-weird-characters
set-option -sa terminal-features ',xterm-256color:RGB'
set-option -sa terminal-overrides ',xterm*:Tc' # support 24 bit colors

set -g focus-events on
set -g set-clipboard on # enable system clipboard

# Let apps pass OSC escape sequences through tmux to the outer terminal (WezTerm)
# instead of having them swallowed. Required for Claude Code's notification hook to
# deliver native desktop-notification toasts (OSC 777) to WezTerm through tmux.
# See docs/superpowers/specs for the notification architecture.
set -g allow-passthrough on

# Distinguish Shift+Enter from plain Enter so Claude Code's newline shortcut works
# inside tmux (the official Claude-in-tmux config, alongside allow-passthrough).
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Bell monitoring: flag the window in the status bar when a pane rings the bell.
# Claude Code's notify hook rings it (printf '\a') so you can see WHICH tmux tab is
# waiting on you. `any` reports bells from every window (not just background ones);
# the visible indicator is the 󰂞 badge added to @catppuccin_window_text below
# (Catppuccin hardcodes per-segment #[bg=], which paints over window-status-bell-style,
# so the cue must live inside the window format itself).
set-window-option -g monitor-bell on
set-option -g bell-action any

set-option -g allow-rename off # don't rename windows automatically
set -g base-index 1 # Start windows and panes at 1, not 0
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g renumber-windows on # renumber windows when a window is closed

# Enable mouse mode (tmux 2.1 and above)
# Options to make tmux more pleasant
set -g mouse on

set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on' # auto-restore last saved tmux session on server start (survives reboot)
set -g @plugin 'hallazzang/tmux-reset'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'O'
set -g @sessionx-fzf-builtin-tmux 'on'

set -g @plugin 'omerxx/tmux-floax'

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "frappe"
# Inactive tabs: window name on wide clients; empty (index only) on narrow
# clients. The index #I is rendered by Catppuccin outside this variable.
# Catppuccin inlines this value raw into window-status-format and defers it to
# render time, so #{client_width} resolves per client. Numeric compare: e|>=.
# A peach 󰂞 BELL badge is prepended when window_bell_flag is set, so you can see
# WHICH tab rang (Claude Code's notify hook rings the bell). It shows even on narrow
# clients (outside the width gate) and auto-clears when you visit the window. Commas
# inside #[...] are escaped as #, so they aren't read as the ternary's true/false split.
set -g @catppuccin_window_text "#{?window_bell_flag,#[fg=#232634#,bg=#e5c890] 󰂞 #[fg=#c6d0f5#,bg=#{@thm_surface_0}],}#{?#{e|>=:#{client_width},#{@ui_full_min_width}}, #W,}"
set -g @catppuccin_window_current_text " #W #[fg=yellow]#{b:pane_current_path}#{?window_zoomed_flag, 󰍉,}"
set -g @catppuccin_window_status_style "basic"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# Width threshold (columns): clients >= this render the FULL UI; narrower
# clients (e.g. phone over SSH) render the MINIMAL one. Drives BOTH the
# right side and the window list (Catppuccin window text above).
# Measure your phone once while attached:  tmux display -p '#{client_width}'
# then set this between the phone width and your PC width.
set -g @ui_full_min_width "120"

# Build status-right as the FULL chain, exactly as before. This must be the plain
# chain (NOT yet width-gated) so that during `run tpm` the tmux-cpu / tmux-battery
# plugins can string-substitute their #{cpu_percentage}/#{battery_*} placeholders --
# those plugins only scan the status-right / status-left option VALUES. The
# per-client width gating is applied AFTER tpm, once the chain is substituted.
# Reset first so tmux-continuum doesn't inherit the default tmux status-right.
# (order: application | datetime | cpu | session | uptime | battery)
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_application}"
set -ag  status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag  status-right "#{E:@catppuccin_status_session}"
set -ag  status-right "#{E:@catppuccin_status_uptime}"
# (upower alternative kept commented for reference)
# if-shell 'command -v upower >/dev/null && upower -e | grep -q battery' \
#    'set -agF status-right "#{E:@catppuccin_status_battery}"'
if-shell '[ -d /sys/class/power_supply/BAT0 ] || ls /sys/class/power_supply/BAT* >/dev/null 2>&1' \
    'set -agF status-right "#{E:@catppuccin_status_battery}"'
if-shell '[ "$(uname)" = "Darwin" ] && pmset -g batt 2>/dev/null | grep -q Battery' \
    'set -agF status-right "#{E:@catppuccin_status_battery}"'

run '~/.tmux/plugins/tpm/tpm'

# --- Per-client width-adaptive status-right (must run AFTER tpm) ---
# By now status-right is the full chain with tmux-cpu/battery placeholders already
# substituted to #(...) commands (and tmux-continuum's save hook prepended). Capture
# that fully-substituted value into @status_right_full, then rebuild status-right as
# a per-client width ternary. The branches MUST be single #{E:@...} tokens: literal
# #[fg=,bg=] commas inside the chain are otherwise read as the ternary's TRUE,FALSE
# separator and mangle the whole bar, whereas a #{...} token is parsed atomically.
# Comparison is numeric (#{e|>=:...}); bare #{>=:...} would be a STRING compare.
#   FULL (wide):   @status_right_full (application|datetime|cpu|session|uptime|[battery])
#   MIN  (narrow): session only
# (Tradeoff: tmux-continuum's save hook lives in the full branch, so auto-save runs
#  on wide clients; a narrow-only phone session won't trigger it -- acceptable.)
run-shell 'tmux set -g @status_right_full "$(tmux show -gqv status-right)"'
set -g status-right "#{?#{e|>=:#{client_width},#{@ui_full_min_width}},#{E:@status_right_full},#{E:@catppuccin_status_session}}"
