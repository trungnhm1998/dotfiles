# ref
# http://www.hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

source $HOME/dotfiles/tmux/reset.conf
source $HOME/dotfiles/tmux/tmux-keybindings.conf

set-option -g default-terminal "tmux-256color"
# ref https://wezfurlong.org/wezterm/faq.html#how-to-troubleshoot-keys-that-dont-work-or-produce-weird-characters
set-option -sa terminal-features ',xterm-256color:RGB'
set-option -sa terminal-overrides ',xterm*:Tc' # support 24 bit colors

set -g focus-events on
set -g set-clipboard on # enable system clipboard

set-option -g allow-rename off # don't rename windows automatically
set -g base-index 1 # Start windows and panes at 1, not 0
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g renumber-windows on # renumber windows when a window is closed

# Enable mouse mode (tmux 2.1 and above)
# Options to make tmux more pleasant
set -g mouse on

set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hallazzang/tmux-reset'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'O'
set -g @sessionx-fzf-builtin-tmux 'on'

set -g @plugin 'omerxx/tmux-floax'

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "frappe"
# Inactive tabs: window name on wide clients; empty (index only) on narrow
# clients. The index #I is rendered by Catppuccin outside this variable.
# Catppuccin inlines this value raw into window-status-format and defers it to
# render time, so #{client_width} resolves per client. Numeric compare: e|>=.
set -g @catppuccin_window_text "#{?#{e|>=:#{client_width},#{@ui_full_min_width}}, #W,}"
set -g @catppuccin_window_current_text " #W #[fg=yellow]#{b:pane_current_path}#{?window_zoomed_flag, 󰍉,}"
set -g @catppuccin_window_status_style "basic"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# Width threshold (columns): clients >= this render the FULL UI; narrower
# clients (e.g. phone over SSH) render the MINIMAL one. Drives BOTH the
# right side and the window list (Catppuccin window text above).
# Measure your phone once while attached:  tmux display -p '#{client_width}'
# then set this between the phone width and your PC width.
set -g @ui_full_min_width "120"

# Build the FULL right-side chain into @status_right_full, using the SAME per-module
# flags as before: -agF force-expands the module so the tmux-cpu / tmux-battery
# placeholders (#{cpu_percentage}, #{cpu_fg_color}, #{battery_*}) surface as literal
# text for those plugins to string-substitute at `run tpm`; -ag defers the rest.
# (order: application | datetime | cpu | session | uptime | battery)
set -g  @status_right_full ""
set -agF @status_right_full "#{E:@catppuccin_status_application}"
set -ag  @status_right_full "#{E:@catppuccin_status_date_time}"
set -agF @status_right_full "#{E:@catppuccin_status_cpu}"
set -ag  @status_right_full "#{E:@catppuccin_status_session}"
set -ag  @status_right_full "#{E:@catppuccin_status_uptime}"
# Battery appended only on battery hardware (matches prior behavior)
# (upower alternative kept commented for reference)
# if-shell 'command -v upower >/dev/null && upower -e | grep -q battery' \
#    'set -agF @status_right_full "#{E:@catppuccin_status_battery}"'
if-shell '[ -d /sys/class/power_supply/BAT0 ] || ls /sys/class/power_supply/BAT* >/dev/null 2>&1' \
    'set -agF @status_right_full "#{E:@catppuccin_status_battery}"'
if-shell '[ "$(uname)" = "Darwin" ] && pmset -g batt 2>/dev/null | grep -q Battery' \
    'set -agF @status_right_full "#{E:@catppuccin_status_battery}"'

# Per-client status-right via a deferred width ternary (the status line is rendered
# per client, so #{client_width} is that client's own width). Built in 3 appends so
# the FULL branch's #{cpu_percentage}/#{battery_*} placeholders surface in the
# status-right value for tmux-cpu / tmux-battery to substitute at `run tpm`, while
# the #{client_width} ternary stays deferred to render time:
#   1) -ag   open the ternary + numeric width condition (deferred)
#   2) -agF  insert @status_right_full's value (force-expanded -> placeholders surface)
#   3) -ag   close with the MINIMAL (narrow) branch: session only (deferred)
# Comparison MUST be #{e|>=:...} (numeric); bare #{>=:...} is a STRING compare.
#   FULL (wide):  application | datetime | cpu | session | uptime | [battery]
#   MIN  (narrow): session only
set -g  status-right "#{?#{e|>=:#{client_width},#{@ui_full_min_width}},"
set -agF status-right "#{@status_right_full}"
set -ag  status-right ",#{E:@catppuccin_status_session}}"

run '~/.tmux/plugins/tpm/tpm'
